# RonwayScanner API — reverse-proxy server block for the Bitnami Nginx
# stack on AWS Lightsail.
#
# Install:
#   sudo cp deploy/nginx-ronway.conf /opt/bitnami/nginx/conf/server_blocks/ronway.conf
#   sudo /opt/bitnami/ctlscript.sh restart nginx
#
# Then provision HTTPS (edits this block in place, adds :443 + auto-renew):
#   sudo /opt/bitnami/bncert-tool
#
# Replace ronway-api.bpxai.com with your actual subdomain (its DNS A record
# must already point at this instance's public IP).

server {
    listen 80;
    listen [::]:80;
    server_name ronway-api.bpxai.com;

    # The scanner listens only on loopback; the public port stays firewalled.
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A scan can take up to 30s — give the upstream room before timing out.
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
